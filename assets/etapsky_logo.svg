<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
  

  <!-- Symbol mark: stacked ascending steps — "étape" metaforu -->
  <g transform="translate(186, 90)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- 3 yükselen blok — sol'dan sağ'a büyüyen -->
    <rect x="0" y="72" width="28" height="28" rx="4" style="fill:rgb(83, 74, 183);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <rect x="36" y="44" width="28" height="56" rx="4" style="fill:rgb(29, 158, 117);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <rect x="72" y="16" width="28" height="84" rx="4" style="fill:rgb(83, 74, 183);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- İnce bağlantı çizgisi — basamakları birleştiriyor -->
    <polyline points="14,72 14,60 50,60 50,44 86,44 86,16" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="3 3" style="fill:none;stroke:rgb(83, 74, 183);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-dasharray:3px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Wordmark -->
  <text x="320" y="158" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial,Helvetica,sans-serif;font-size:52px;font-weight:500;text-anchor:start;dominant-baseline:auto">Etapsky</text>

  <!-- Tagline (monospace for max compatibility when SVG opened standalone) -->
  <text x="320" y="200" fill="#1a1a1a" font-family="monospace" font-size="24" font-weight="bold" text-anchor="start">TECHNOLOGY</text>

  <!-- Ayırıcı çizgi — symbol ile wordmark arasında -->
  <line x1="310" y1="110" x2="310" y2="195" stroke="#534AB7" stroke-width="1" stroke-opacity="0.25" style="fill:rgb(0, 0, 0);stroke:rgb(83, 74, 183);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>